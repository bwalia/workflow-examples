name: Deploy Nexus Repository Manager

on:
  push:
    branches:
      - main
      - master
    paths:
      - "helm/nexus/**"
      - ".github/workflows/deploy-nexus.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stage
          - prod
      action:
        description: "Deployment action"
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy
          - destroy

env:
  HELM_REPO_NAME: sonatype
  HELM_REPO_URL: https://sonatype.github.io/helm3-charts/
  HELM_CHART: sonatype/nexus-repository-manager
  VAULT_SECRET_PATH: secret/nexus/admin

jobs:
  deploy:
    name: Deploy Nexus (${{ inputs.environment || 'dev' }})
    runs-on: self-hosted
    environment:
      name: ${{ inputs.environment || 'dev' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set environment defaults
        id: env
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          echo "environment=${ENV}" >> $GITHUB_OUTPUT
          echo "namespace=${{ vars.NEXUS_NAMESPACE || 'nexus' }}" >> $GITHUB_OUTPUT
          echo "release=${{ vars.NEXUS_RELEASE_NAME || 'nexus' }}" >> $GITHUB_OUTPUT
          echo "ui_host=${{ vars.NEXUS_UI_HOST || 'dev-nexus.workstation.co.uk' }}" >> $GITHUB_OUTPUT
          echo "docker_host=${{ vars.NEXUS_DOCKER_HOST || 'dev-registry.workstation.co.uk' }}" >> $GITHUB_OUTPUT
          echo "storage_size=${{ vars.NEXUS_STORAGE_SIZE || '50Gi' }}" >> $GITHUB_OUTPUT

      - name: Install tools
        run: |
          # kubectl
          if ! command -v kubectl &>/dev/null; then
            curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          fi
          kubectl version --client --short 2>/dev/null || kubectl version --client

          # helm
          if ! command -v helm &>/dev/null; then
            curl -sfL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          fi
          helm version --short

          # vault
          if ! command -v vault &>/dev/null; then
            curl -sfLO https://releases.hashicorp.com/vault/1.15.4/vault_1.15.4_linux_amd64.zip
            unzip -o vault_1.15.4_linux_amd64.zip && sudo mv vault /usr/local/bin/ && rm vault_1.15.4_linux_amd64.zip
          fi
          vault version

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_K3S0 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl cluster-info

      - name: Configure Nexus credentials via Vault
        id: creds
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: |
          VAULT_AVAILABLE=false
          NEXUS_USER=""
          NEXUS_PASS=""

          # Try fetching from Vault
          if [ -n "$VAULT_ADDR" ] && [ -n "$VAULT_TOKEN" ]; then
            VAULT_DATA=$(vault kv get -format=json ${{ env.VAULT_SECRET_PATH }} 2>/dev/null || echo "")
            if [ -n "$VAULT_DATA" ]; then
              NEXUS_USER=$(echo "$VAULT_DATA" | jq -r '.data.data.username // .data.username // empty')
              NEXUS_PASS=$(echo "$VAULT_DATA" | jq -r '.data.data.password // .data.password // empty')
              if [ -n "$NEXUS_USER" ] && [ -n "$NEXUS_PASS" ]; then
                VAULT_AVAILABLE=true
                echo "Using credentials from Vault"
              fi
            fi
          fi

          # Fall back to GitHub Secrets
          if [ "$VAULT_AVAILABLE" = "false" ]; then
            NEXUS_USER="${{ secrets.NEXUS_ADMIN_USER }}"
            NEXUS_PASS="${{ secrets.NEXUS_ADMIN_PASSWORD }}"

            if [ -z "$NEXUS_USER" ]; then
              NEXUS_USER="admin"
            fi
            if [ -z "$NEXUS_PASS" ]; then
              NEXUS_PASS=$(openssl rand -base64 24)
              echo "::warning::Generated random Nexus admin password"
            fi

            # Store in Vault if available
            if [ -n "$VAULT_ADDR" ] && [ -n "$VAULT_TOKEN" ]; then
              vault kv put ${{ env.VAULT_SECRET_PATH }} \
                username="$NEXUS_USER" \
                password="$NEXUS_PASS" 2>/dev/null && \
                echo "Stored credentials in Vault" || \
                echo "::warning::Could not store credentials in Vault"
            fi
          fi

          echo "::add-mask::$NEXUS_PASS"
          echo "username=$NEXUS_USER" >> $GITHUB_OUTPUT
          echo "password=$NEXUS_PASS" >> $GITHUB_OUTPUT

      # ============================================
      # DESTROY
      # ============================================
      - name: Destroy Nexus
        if: inputs.action == 'destroy'
        run: |
          NAMESPACE="${{ steps.env.outputs.namespace }}"
          RELEASE="${{ steps.env.outputs.release }}"

          echo "=== Uninstalling Nexus ==="
          helm uninstall "$RELEASE" -n "$NAMESPACE" --wait 2>/dev/null || echo "Release not found"

          echo "=== Cleaning up PVCs ==="
          kubectl delete pvc -l app.kubernetes.io/instance="$RELEASE" -n "$NAMESPACE" 2>/dev/null || true

          echo "Nexus destroyed in namespace $NAMESPACE"

      # ============================================
      # DEPLOY
      # ============================================
      - name: Ensure namespace exists
        if: inputs.action != 'destroy'
        run: |
          kubectl create namespace "${{ steps.env.outputs.namespace }}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Add Helm repo
        if: inputs.action != 'destroy'
        run: |
          helm repo add ${{ env.HELM_REPO_NAME }} ${{ env.HELM_REPO_URL }}
          helm repo update

      - name: Deploy Nexus via Helm
        if: inputs.action != 'destroy'
        run: |
          NAMESPACE="${{ steps.env.outputs.namespace }}"
          RELEASE="${{ steps.env.outputs.release }}"
          UI_HOST="${{ steps.env.outputs.ui_host }}"
          DOCKER_HOST="${{ steps.env.outputs.docker_host }}"
          STORAGE_SIZE="${{ steps.env.outputs.storage_size }}"

          # Use custom values file if present, otherwise inline
          VALUES_ARGS=""
          if [ -f helm/nexus/values.yaml ]; then
            VALUES_ARGS="-f helm/nexus/values.yaml"
          fi

          helm upgrade --install "$RELEASE" ${{ env.HELM_CHART }} \
            --namespace "$NAMESPACE" \
            $VALUES_ARGS \
            --set ingress.enabled=true \
            --set "ingress.hostRepo=${DOCKER_HOST}" \
            --set "ingress.hostPath=/" \
            --set "ingress.ingressClassName=nginx" \
            --set "ingress.annotations.cert-manager\\.io/cluster-issuer=letsencrypt-prod" \
            --set "ingress.tls[0].secretName=nexus-ui-tls" \
            --set "ingress.tls[0].hosts[0]=${UI_HOST}" \
            --set "ingress.rules[0].host=${UI_HOST}" \
            --set "ingress.rules[0].http.paths[0].path=/" \
            --set "ingress.rules[0].http.paths[0].pathType=Prefix" \
            --set "persistence.enabled=true" \
            --set "persistence.storageSize=${STORAGE_SIZE}" \
            --set "resources.requests.cpu=500m" \
            --set "resources.requests.memory=2Gi" \
            --set "resources.limits.cpu=2" \
            --set "resources.limits.memory=4Gi" \
            --set "nexus.docker.enabled=true" \
            --set "nexus.docker.registries[0].host=${DOCKER_HOST}" \
            --set "nexus.docker.registries[0].port=5000" \
            --set "nexus.env[0].name=NEXUS_SECURITY_RANDOMPASSWORD" \
            --set "nexus.env[0].value=false" \
            --atomic \
            --timeout 10m \
            --wait

          echo "Nexus deployed successfully"

      - name: Wait for rollout
        if: inputs.action != 'destroy'
        run: |
          NAMESPACE="${{ steps.env.outputs.namespace }}"
          RELEASE="${{ steps.env.outputs.release }}"

          echo "=== Waiting for Nexus deployment ==="
          kubectl rollout status deployment/"${RELEASE}-nexus-repository-manager" \
            -n "$NAMESPACE" --timeout=600s

          echo "=== Pod status ==="
          kubectl get pods -n "$NAMESPACE" -l app.kubernetes.io/instance="$RELEASE" -o wide

      - name: Configure admin password
        if: inputs.action != 'destroy'
        run: |
          NAMESPACE="${{ steps.env.outputs.namespace }}"
          RELEASE="${{ steps.env.outputs.release }}"
          UI_HOST="${{ steps.env.outputs.ui_host }}"
          NEXUS_USER="${{ steps.creds.outputs.username }}"
          NEXUS_PASS="${{ steps.creds.outputs.password }}"

          # Wait for Nexus API to be ready
          echo "Waiting for Nexus API..."
          for i in $(seq 1 30); do
            STATUS=$(kubectl exec -n "$NAMESPACE" deploy/"${RELEASE}-nexus-repository-manager" -- \
              curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/service/rest/v1/status 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Nexus API ready"
              break
            fi
            echo "  Attempt $i/30 - HTTP $STATUS"
            sleep 10
          done

          # Check if default admin password file exists (first boot)
          DEFAULT_PASS=$(kubectl exec -n "$NAMESPACE" deploy/"${RELEASE}-nexus-repository-manager" -- \
            cat /nexus-data/admin.password 2>/dev/null || echo "")

          if [ -n "$DEFAULT_PASS" ]; then
            echo "Setting admin password from default..."
            kubectl exec -n "$NAMESPACE" deploy/"${RELEASE}-nexus-repository-manager" -- \
              curl -s -X PUT http://localhost:8081/service/rest/v1/security/users/admin/change-password \
              -H "Content-Type: text/plain" \
              -u "admin:${DEFAULT_PASS}" \
              -d "${NEXUS_PASS}" && echo "Password updated" || echo "::warning::Could not update password"
          fi

      # ============================================
      # SMOKE TESTS
      # ============================================
      - name: Run smoke tests
        if: inputs.action != 'destroy'
        run: |
          NAMESPACE="${{ steps.env.outputs.namespace }}"
          RELEASE="${{ steps.env.outputs.release }}"
          UI_HOST="${{ steps.env.outputs.ui_host }}"
          DOCKER_HOST="${{ steps.env.outputs.docker_host }}"
          NEXUS_USER="${{ steps.creds.outputs.username }}"
          NEXUS_PASS="${{ steps.creds.outputs.password }}"

          PASSED=0
          FAILED=0
          TOTAL=0

          run_test() {
            local name="$1"
            local result="$2"
            TOTAL=$((TOTAL + 1))
            if [ "$result" = "PASS" ]; then
              PASSED=$((PASSED + 1))
              echo "  PASS: $name"
            else
              FAILED=$((FAILED + 1))
              echo "  FAIL: $name"
            fi
          }

          echo "============================================"
          echo "       NEXUS SMOKE TESTS"
          echo "============================================"
          echo ""

          # Test 1: Pod health
          echo "--- Pod Health ---"
          POD_STATUS=$(kubectl get pods -n "$NAMESPACE" -l app.kubernetes.io/instance="$RELEASE" \
            -o jsonpath='{.items[0].status.phase}' 2>/dev/null || echo "Unknown")
          run_test "Pod is Running" "$([ "$POD_STATUS" = "Running" ] && echo PASS || echo FAIL)"

          # Test 2: Container ready
          READY=$(kubectl get pods -n "$NAMESPACE" -l app.kubernetes.io/instance="$RELEASE" \
            -o jsonpath='{.items[0].status.containerStatuses[0].ready}' 2>/dev/null || echo "false")
          run_test "Container is Ready" "$([ "$READY" = "true" ] && echo PASS || echo FAIL)"

          # Test 3: Nexus status API (via port-forward)
          echo ""
          echo "--- API Health (via kubectl exec) ---"
          API_STATUS=$(kubectl exec -n "$NAMESPACE" deploy/"${RELEASE}-nexus-repository-manager" -- \
            curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/service/rest/v1/status 2>/dev/null || echo "000")
          run_test "Nexus Status API (HTTP 200)" "$([ "$API_STATUS" = "200" ] && echo PASS || echo FAIL)"

          # Test 4: Nexus status check API
          STATUS_CHECK=$(kubectl exec -n "$NAMESPACE" deploy/"${RELEASE}-nexus-repository-manager" -- \
            curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/service/rest/v1/status/check 2>/dev/null || echo "000")
          run_test "Nexus Status Check API (HTTP 200)" "$([ "$STATUS_CHECK" = "200" ] && echo PASS || echo FAIL)"

          # Test 5: Authentication works
          AUTH_STATUS=$(kubectl exec -n "$NAMESPACE" deploy/"${RELEASE}-nexus-repository-manager" -- \
            curl -s -o /dev/null -w "%{http_code}" -u "${NEXUS_USER}:${NEXUS_PASS}" \
            http://localhost:8081/service/rest/v1/repositories 2>/dev/null || echo "000")
          run_test "Admin authentication (HTTP 200)" "$([ "$AUTH_STATUS" = "200" ] && echo PASS || echo FAIL)"

          # Test 6: Docker registry API (if enabled)
          DOCKER_STATUS=$(kubectl exec -n "$NAMESPACE" deploy/"${RELEASE}-nexus-repository-manager" -- \
            curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/v2/ 2>/dev/null || echo "000")
          run_test "Docker Registry API (/v2/)" "$([ "$DOCKER_STATUS" = "200" ] || [ "$DOCKER_STATUS" = "401" ] && echo PASS || echo FAIL)"

          # Test 7: External UI endpoint (if ingress is configured)
          echo ""
          echo "--- External Endpoints ---"
          EXT_UI=$(curl -sk -o /dev/null -w "%{http_code}" -m 10 "https://${UI_HOST}/service/rest/v1/status" 2>/dev/null || echo "000")
          if [ "$EXT_UI" = "000" ]; then
            echo "  SKIP: External UI (${UI_HOST}) - not reachable (ingress may be pending)"
          else
            run_test "External UI endpoint (HTTPS)" "$([ "$EXT_UI" = "200" ] && echo PASS || echo FAIL)"
          fi

          # Test 8: External Docker registry
          EXT_DOCKER=$(curl -sk -o /dev/null -w "%{http_code}" -m 10 "https://${DOCKER_HOST}/v2/" 2>/dev/null || echo "000")
          if [ "$EXT_DOCKER" = "000" ]; then
            echo "  SKIP: Docker Registry (${DOCKER_HOST}) - not reachable (ingress may be pending)"
          else
            run_test "External Docker Registry (HTTPS)" "$([ "$EXT_DOCKER" = "200" ] || [ "$EXT_DOCKER" = "401" ] && echo PASS || echo FAIL)"
          fi

          # Test 9: Service exists
          echo ""
          echo "--- Kubernetes Resources ---"
          SVC=$(kubectl get svc -n "$NAMESPACE" -l app.kubernetes.io/instance="$RELEASE" --no-headers 2>/dev/null | wc -l)
          run_test "Service exists" "$([ "$SVC" -gt 0 ] && echo PASS || echo FAIL)"

          # Test 10: PVC bound
          PVC_STATUS=$(kubectl get pvc -n "$NAMESPACE" -l app.kubernetes.io/instance="$RELEASE" \
            -o jsonpath='{.items[0].status.phase}' 2>/dev/null || echo "Unknown")
          run_test "PVC is Bound" "$([ "$PVC_STATUS" = "Bound" ] && echo PASS || echo FAIL)"

          echo ""
          echo "============================================"
          echo "  RESULTS: ${PASSED}/${TOTAL} passed, ${FAILED} failed"
          echo "============================================"

          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "::error::${FAILED} smoke test(s) failed"
            exit 1
          fi

      - name: Deployment summary
        if: inputs.action != 'destroy' && success()
        run: |
          echo ""
          echo "=========================================="
          echo "    NEXUS DEPLOYMENT COMPLETE"
          echo "=========================================="
          echo ""
          echo "  Environment: ${{ steps.env.outputs.environment }}"
          echo "  Namespace:   ${{ steps.env.outputs.namespace }}"
          echo "  Release:     ${{ steps.env.outputs.release }}"
          echo ""
          echo "  Nexus UI:        https://${{ steps.env.outputs.ui_host }}"
          echo "  Docker Registry: https://${{ steps.env.outputs.docker_host }}"
          echo ""
          echo "  Vault Path:      ${{ env.VAULT_SECRET_PATH }}"
          echo "=========================================="
