global:
  scrape_interval: 5s
  external_labels:
    cluster: demo
    namespace: demo

rule_files:
  - /etc/prometheus/rules.yaml

scrape_configs:
  - job_name: demo/mimir
    static_configs:
      - targets: ["mimir-1:8080"]
        labels:
          pod: "mimir-1"
      - targets: ["mimir-2:8080"]
        labels:
          pod: "mimir-2"
      - targets: ["mimir-3:8080"]
        labels:
          pod: "mimir-3"

  - job_name: demo/netscaler
    scrape_interval: 10s
    scrape_timeout: 5s
    static_configs:
      - targets: ["ns-sim-ams-01:8000"]
        labels:
          instance: "nsr1.kisaan001.bru.fictionally.org"
          region: "ams"
          role: "primary"
          environment: "dev"
      - targets: ["ns-sim-ams-02:8000"]
        labels:
          instance: "nsr2.kisaan001.bru.fictionally.org"
          region: "ams"
          role: "secondary"
          environment: "dev"
      - targets: ["ns-sim-ash-01:8000"]
        labels:
          instance: "nsr1.kisaan001.lon.fictionally.org"
          region: "ash"
          role: "primary"
          environment: "dev"

remote_write:
  - url: http://load-balancer:9009/api/v1/push
    # Add X-Scope-OrgID header so that Mimir knows what tenant the remote write data should be stored in.
    # In this case, our tenant is "demo"
    headers:
      X-Scope-OrgID: demo
